# AgentCrew 설정 예제

repo:
  url: "https://github.com/example/my-project.git"
  branch: "main"
  language: "java"

stack:
  framework: "spring-boot"
  build_tool: "gradle"
  java_version: "17"

default_model:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4096

agents:
  agent1:
    enabled: true
    max_retries: 3
    timeout_minutes: 10
  agent2:
    enabled: true
    max_retries: 3
    timeout_minutes: 10
  agent3:
    enabled: true
    model:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
      temperature: 0.2
      max_tokens: 8192
    max_retries: 3
    timeout_minutes: 30
  agent4:
    enabled: true
    max_retries: 3
    timeout_minutes: 15

notification:
  enabled: true
  type: "discord"
  webhook_url: "https://discord.com/api/webhooks/xxxxx/yyyyy"
